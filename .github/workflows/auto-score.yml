name: Auto-Score Matches

on:
  schedule:
    # Every 10 minutes — GH Actions cron has delays, shorter interval catches windows reliably
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  WC2026_API_KEY: ${{ secrets.WC2026_API_KEY }}

jobs:
  auto-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run auto-score script
        run: python3 .github/scripts/auto-score.py

      - name: Log run timestamp
        run: echo "Auto-score completed at $(date -u)"
