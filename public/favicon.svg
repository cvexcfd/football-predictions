<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFF3A0"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="globeShine" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FFF8D6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background: iOS-style rounded square -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="#121212"/>
  <!-- Globe/Cup at top -->
  <circle cx="50" cy="28" r="18" fill="url(#goldGradient)"/>
  <circle cx="50" cy="28" r="18" fill="url(#globeShine)"/>
  <!-- Globe continent lines -->
  <path d="M36 22 Q50 10 64 22" fill="none" stroke="#B8860B" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M36 34 Q50 46 64 34" fill="none" stroke="#B8860B" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M50 10 L50 46" fill="none" stroke="#B8860B" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M32 28 Q50 22 68 28" fill="none" stroke="#B8860B" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Left figure -->
  <path d="M38 46 C28 52 24 62 27 72 L34 72 C32 65 35 57 40 52 Z" fill="url(#goldGradient)"/>
  <!-- Right figure -->
  <path d="M62 46 C72 52 76 62 73 72 L66 72 C68 65 65 57 60 52 Z" fill="url(#goldGradient)"/>
  <!-- Base -->
  <rect x="28" y="72" width="44" height="6" rx="2" fill="url(#goldGradient)"/>
  <rect x="32" y="78" width="36" height="5" rx="1.5" fill="url(#goldGradient)"/>
  <rect x="38" y="83" width="24" height="3" rx="1" fill="url(#goldGradient)"/>
  <!-- Subtle shine overlay -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="url(#globeShine)" opacity="0.15"/>
</svg>
